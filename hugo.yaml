    announcements:
    - enabled: true
      label: "Pro Edition Private Beta"
      bgColor: "#F3CFCB"
      message: "This product is in early preview. Sign up to join the private beta program and get early access."
      buttonText: "Enroll"
      buttonLink: "#section5"
    - enabled: true
      label: "Community Edition Is Public"
      bgColor: "#DFF3E8"
      message: |
        The Community Edition is now freely available for everyone. Grab your copy today!
      buttonText: "Get It Now"
      buttonLink: "https://marketplace.visualstudio.com/items?itemName=lextudio.vscode-yang-community"
    - enabled: true
