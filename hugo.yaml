  sectionStudio:
    title: "YANG Studio for Visual Studio Code"
    subtitle: "Next-generation cross-platform YANG/NETCONF tooling for all professionals, embracing the AI era."
    items:
    # - title: "OID Explorer"
    #   image: oid-explorer.png
    #   text: |
    #     Explore and search MIBs and OIDs inline — copy OIDs, view attributes, and open definitions in files.
    # - title: "Dependency Graph"
    #   image: dependency-graph.png
    #   text: |
    #     Visualize MIB/module relationships to understand imports and dependencies at a glance.
    # - title: "Highlighting and Navigation"
    #   image: semantic-highlighting.png
    #   text: |
    #     Semantic highlighting with perfect accuracy, plus go-to-definition and find-references inside MIB files.
    #   # Optional per-item settings (none currently)
    # - title: "Message Session"
    #   image: message-session.png
    #   text: |
    #     Inspect and replay SNMP message sessions inline — view requests and responses with timing and payload details.
