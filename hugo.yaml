  # workspace: hugo.work
  imports:
    path: github.com/StefMa/hugo-fresh

googleAnalytics: G-1JCDDDFB5H # Put in your tracking code without quotes like this: UA-XXX for universal tracking or G-XXX analytics v4 tracking
